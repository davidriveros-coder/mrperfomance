# ╔══════════════════════════════════════════════════════════════╗
# ║  netlify.toml — MRPERFORMANCE                                 ║
# ║  Sitio estático (HTML/JS). No requiere build.                 ║
# ╚══════════════════════════════════════════════════════════════╝

[build]
  # No hay proceso de build: se publica la carpeta tal cual.
  publish = "."

# ── Cabeceras de seguridad para todo el sitio ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
    # CSP: permite solo recursos propios.
    # 'unsafe-inline' es necesario porque el CSS y el JS están embebidos en el HTML.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# ── Cache corto para el config (cámbialo cuando publiques el sitio real) ──
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
