# ╔══════════════════════════════════════════════════════════════╗
# ║  netlify.toml — MRPERFORMANCE                                 ║
# ║  Sitio estático (HTML/JS). No requiere build.                 ║
# ╚══════════════════════════════════════════════════════════════╝

[build]
  # No hay proceso de build: se publica la carpeta tal cual.
  publish = "."

# ── Cabeceras de seguridad para todo el sitio ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
    # CSP: permite solo recursos propios (Decap CMS y Netlify Identity se sirven
    # desde /admin/vendor, no desde un CDN externo, así que no hace falta abrir
    # script-src a terceros). 'blob:' en img-src es para las previews de imágenes
    # que sube el panel /admin.
    # 'unsafe-inline' es necesario porque el CSS y el JS están embebidos en el HTML.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# ── Cache corto para los datos del sitio (se editan seguido desde /admin) ──
[[headers]]
  for = "/config.json"
  [headers.values]
    Cache-Control = "public, max-age=60"

# ── Rutas "limpias" a secciones de la home (para compartir en Instagram, anuncios, etc.) ──
# /servicios NO está acá: es una página propia (servicios.html) que Netlify sirve
# automáticamente gracias a las "pretty URLs". Estas otras siguen viviendo dentro
# de index.html — la regla sirve el mismo archivo y su JS hace scroll a la sección.
[[redirects]]
  from = "/nosotros"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/clientes"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/horarios"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/index.html"
  status = 200
